name: quraanapp
description: "quraan"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.4
  font_awesome_flutter: ^11.0.0
  freezed_annotation: ^2.4.0
  get_it: ^9.2.1
  go_router: ^17.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  icons_launcher: ^3.0.3
  intl: ^0.20.2
  json_annotation: ^4.9.0
  just_audio: ^0.10.5
  scrollable_positioned_list: ^0.3.8
  shared_preferences: ^2.5.4
  switch_button: ^0.0.1

dev_dependencies:

  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0
  flutter_test:
    sdk: flutter
  freezed: ^2.4.7
  hive_generator: ^2.0.1
  json_serializable: ^6.6.2

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/images_png/
    - assets/images/images_svg/
    - assets/quran/quran.json

  fonts:
  - family: Poppins
    fonts:
      - asset: assets/fonts/Poppins-Regular.ttf

  - family: Uthmanic
    fonts:
      - asset: assets/fonts/Uthmanic-Regular.ttf

  - family: Amiri
    fonts:
      - asset: assets/fonts/AmiriQuran-Regular.ttf


# --------------------------
# Splash screen configuration
flutter_native_splash:
  color: "#863ED5"
  image: assets/icon.png
  android: true

# Launcher icon configuration
flutter_launcher_icons:
  android: true
  image_path: "assets/icon.png"
  background_color: "#863ED5"
