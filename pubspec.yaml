name: quraanapp
description: "quraan"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  audioplayers: ^6.6.0
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  easy_localization: ^3.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.4
  font_awesome_flutter: ^11.0.0
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  go_router: ^17.0.0
  icons_launcher: ^3.0.3
  intl: ^0.20.2
  json_annotation: ^4.11.0
  pretty_dio_logger: ^1.4.0
  retrofit: ^4.0.1
  scrollable_positioned_list: ^0.3.8
  shared_preferences: ^2.5.4
  switch_button: ^0.0.1

dev_dependencies:
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  retrofit_generator: ^10.2.3
flutter:
  uses-material-design: true
  assets:
    - assets/images/images_png/
    - assets/images/images_svg/
    - assets/quran/quran.json

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf

    - family: Uthmanic
      fonts:
        - asset: assets/fonts/Uthmanic-Regular.ttf

    - family: Amiri
      fonts:
        - asset: assets/fonts/AmiriQuran-Regular.ttf

flutter_native_splash:
  color: "#863ED5"
  image: assets/icon.png
  android: true

flutter_launcher_icons:
  android: true
  image_path: "assets/icon.png"
  background_color: "#863ED5"
